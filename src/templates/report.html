
<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <title>Report</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <body>
        Difference: {{ total_difference }}
        <table id="report">
        {{ foreach diff in differences }}
            <tr>
                <td> {{ diff.tag }} </td>
                <td> {{ diff.amount }} </td>
            </tr>
        {{ end }}
        </table>
    </body>
    <svg
        id="graph"
        viewBox="0 0 300 100"
        xmlns="http://www.w3.org/2000/svg"
    >
    </svg>
    <script src="dist/index.js"></script>
</html>
